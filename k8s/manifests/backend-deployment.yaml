apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrawatch-backend
  namespace: infrawatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infrawatch-backend
  template:
    metadata:
      labels:
        app: infrawatch-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: 492851/infrawatch-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/infrawatch"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: infrawatch-backend
  namespace: infrawatch
spec:
  selector:
    app: infrawatch-backend
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: infrawatch-backend-hpa
  namespace: infrawatch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: infrawatch-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50