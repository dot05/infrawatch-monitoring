name: InfraWatch CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Install agent dependencies
        run: |
          cd agent
          npm install

      - name: Check backend syntax
        run: node --check backend/src/index.js

      - name: Check agent syntax
        run: node --check agent/src/index.js

  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: "${{ secrets.DOCKERHUB_USERNAME }}/infrawatch-backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/infrawatch-backend:${{ github.sha }}"

      - name: Build & Push Agent
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          push: true
          tags: "${{ secrets.DOCKERHUB_USERNAME }}/infrawatch-agent:latest,${{ secrets.DOCKERHUB_USERNAME }}/infrawatch-agent:${{ github.sha }}"

  deploy:
    name: Record Deployment Event
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record deployment to InfraWatch
        run: |
          curl -X POST http://localhost:3000/api/deployments \
            -H "Content-Type: application/json" \
            -d '{
              "service": "infrawatch",
              "version": "${{ github.sha }}",
              "status": "success",
              "triggeredBy": "${{ github.actor }}",
              "commitHash": "${{ github.sha }}",
              "notes": "Automated deployment via GitHub Actions"
            }' || echo "Deployment recording skipped (local env)"

      - name: Pipeline Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ InfraWatch CI/CD Pipeline Complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Images pushed to DockerHub"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"