version: '3.8'

services:

  mongodb:
    image: mongo:7.0
    container_name: infrawatch-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: infrawatch
    volumes:
      - mongodb_data:/data/db
    networks:
      - infrawatch-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infrawatch-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/infrawatch
      - PORT=3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - infrawatch-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: infrawatch-agent
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:3000
      - AGENT_ID=local-agent-01
      - INTERVAL=10000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - infrawatch-net
    # Required for system metrics
    privileged: true
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: infrawatch-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - infrawatch-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  grafana:
    image: grafana/grafana:latest
    container_name: infrawatch-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=infrawatch123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - infrawatch-net

volumes:
  mongodb_data:
  grafana_data:

networks:
  infrawatch-net:
    driver: bridge
